services:
  - type: web
    name: mappa-punti-vendita
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: mappa-punti-vendita-db
          property: connectionString

databases:
  - name: mappa-punti-vendita-db
    plan: free
    databaseName: mappa_punti_vendita
    user: mappa_user
